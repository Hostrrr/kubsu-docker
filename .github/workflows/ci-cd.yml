name: CI/CD
on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kubsu
          POSTGRES_PASSWORD: kubsu
          POSTGRES_DB: kubsu
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://kubsu:kubsu@127.0.0.1:5432/kubsu
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install ".[test]"
      - name: Run tests
        run: pytest tests -v
      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            .
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest
  deploy:
    runs-on: self-hosted
    needs: build-and-test
    env:
      IMAGE: ghcr.io/${{ github.repository }}:${{ github.sha }}
    steps:
      - name: Add server to known_hosts
        run: |
          set -x
          echo "HOME=$HOME"
          echo "USER=$USER"
          mkdir -p ~/.ssh
          echo "mkdir ok"
          ssh-keyscan -p 58529 kubsu.tyvik.ru >> ~/.ssh/known_hosts
          echo "keyscan ok"
      - name: Log in to container registry on server
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | ssh -p 58529 huang@kubsu.tyvik.ru \
            "podman login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin"
      - name: Deploy on university server
        run: |
          ssh -p 58529 huang@kubsu.tyvik.ru << ENDSSH
            set -e
            podman pull ${{ env.IMAGE }}
            podman stop kubsu-app 2>/dev/null || true
            podman rm   kubsu-app 2>/dev/null || true
            podman run -d \
              --name kubsu-app \
              --network=host \
              -e DATABASE_URL=postgresql+psycopg://kubsu:kubsu@127.0.0.1:5432/kubsu \
              ${{ env.IMAGE }}
            sleep 2
            podman ps | grep kubsu-app && echo "Container is running"
          ENDSSH
