name: CI/CD

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.name }}
      image_latest: ${{ steps.image.outputs.latest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tags (GHCR requires lowercase)
        id: image
        run: |
          REPO=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')
          echo "name=ghcr.io/${REPO}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "latest=ghcr.io/${REPO}:latest" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}
            ${{ steps.image.outputs.latest }}

  test:
    runs-on: ubuntu-latest
    needs: build
    env:
      IMAGE: ${{ needs.build.outputs.image }}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kubsu
          POSTGRES_PASSWORD: kubsu
          POSTGRES_DB: kubsu
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image from GHCR
        run: docker pull ${{ env.IMAGE }}

      - name: Run tests from tests/
        run: |
          docker run --rm \
            --network host \
            -e DATABASE_URL=postgresql+psycopg://kubsu:kubsu@127.0.0.1:5432/kubsu \
            ${{ env.IMAGE }} \
            python -m pytest tests/ -v

  deploy:
    runs-on: self-hosted
    needs: [build, test]
    permissions:
      contents: read
      packages: read
    steps:
      - name: Add server to known_hosts
        run: |
          set -x
          echo "HOME=$HOME"
          echo "USER=$USER"
          mkdir -p ~/.ssh
          echo "mkdir ok"
          ssh-keyscan -p 58529 kubsu.tyvik.ru >> ~/.ssh/known_hosts
          echo "keyscan ok"

      - name: Deploy on university server
        env:
          IMAGE: ${{ needs.build.outputs.image }}
        run: |
          ssh -p 58529 huang@kubsu.tyvik.ru bash -s <<EOF
            set -e
            echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin
            podman pull "${IMAGE}"
            podman stop kubsu-app 2>/dev/null || true
            podman rm   kubsu-app 2>/dev/null || true
            podman run -d \
              --name kubsu-app \
              --network=host \
              -e DATABASE_URL=postgresql+psycopg://kubsu:kubsu@127.0.0.1:5432/kubsu \
              "${IMAGE}"
            sleep 2
            podman ps | grep kubsu-app && echo "Container is running"
          EOF
